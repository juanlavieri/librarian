name: Publish to PyPI

# Fully automatic releases: whenever the version in pyproject.toml lands on
# `main` and is not yet on PyPI, this builds, publishes, and tags it. To cut a
# release you only bump the version in a PR and merge -- no manual tagging.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.decide.outputs.publish }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: decide
        name: Decide whether this version needs publishing
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/librarian-kb/$version/json")
          if [ "$code" = "200" ]; then
            echo "Version $version already on PyPI -- skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $version not on PyPI -- will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [check, build]
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    # The environment name must match the Trusted Publisher entry on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/librarian-kb
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC) -- no API token needed.
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  tag:
    needs: [check, publish]
    if: needs.check.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # to push the version tag
    steps:
      - uses: actions/checkout@v4
      - name: Tag the released version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          tag="v${{ needs.check.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
