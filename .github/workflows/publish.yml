name: Publish to PyPI

# Publishes when you push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the Trusted Publisher entry on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/librarian-kb
    permissions:
      # Required for PyPI Trusted Publishing (OIDC) -- no API token needed.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
